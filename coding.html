  <script>
    renderCodingCards('codingCardsContainer');

    let activeCode = '', activeTheme = '';
    const codingContainer = document.getElementById('codingCardsContainer');
    Array.from(codingContainer.querySelectorAll('.project-card')).forEach((card, index) => {
      card.dataset.order = String(index);
    });

    function restoreOriginalOrder() {
      const cards = Array.from(codingContainer.querySelectorAll('.project-card'));
      cards
        .sort((left, right) => Number(left.dataset.order) - Number(right.dataset.order))
        .forEach(card => codingContainer.appendChild(card));
    }

    function collapseHiddenExpandedCards() {
      codingContainer.querySelectorAll('.project-card.project-card--expanded').forEach(card => {
        if (card.style.display === 'none') card.classList.remove('project-card--expanded');
      });
    }

    function attachExpansionHandlers() {
      codingContainer.querySelectorAll('.project-summary-name').forEach(title => {
        title.addEventListener('click', event => {
          event.preventDefault();
          const card = title.closest('.project-card');
          const isExpanded = card.classList.contains('project-card--expanded');
          restoreOriginalOrder();
          codingContainer.querySelectorAll('.project-card.project-card--expanded')
            .forEach(other => {
              other.classList.remove('project-card--expanded');
            });
          if (!isExpanded) {
            const visibleCards = Array.from(codingContainer.querySelectorAll('.project-card'))
              .filter(item => item.style.display !== 'none');
            const visibleIndex = visibleCards.indexOf(card);
            if (visibleIndex % 2 === 1) {
              codingContainer.insertBefore(card, visibleCards[visibleIndex - 1]);
            }
            card.classList.add('project-card--expanded');


          }
        });
      });
    }

    attachExpansionHandlers();

    function applyFilters() {
      document.querySelectorAll('#codingCardsContainer .project-card').forEach(card => {
        const tags = card.dataset.tags || '';
        const codeOk  = !activeCode  || tags.includes(activeCode);
        const themeOk = !activeTheme || tags.includes(activeTheme);
        card.style.display = (codeOk && themeOk) ? '' : 'none';
      });
      collapseHiddenExpandedCards();
      restoreOriginalOrder();
    }

    document.querySelectorAll('.project-pill[data-group]').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        document.querySelectorAll('.project-pill[data-group="' + group + '"]')
          .forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (group === 'code') activeCode  = btn.dataset.filter;
        else                  activeTheme = btn.dataset.filter;
        applyFilters();
      });
    });
  </script>
